schema_version: 1
projects:
  - project_id: koreanops_v1
    version: v1
    label: KoreanOps ticket/log RAG
    data_root: C:\vectorsearch-data
    namespace_prefix: koreanops_documents
    datasets:
      - dataset_id: tickets_raw
        label: Ticket CSV raw data
        scope: legacy_root
        stage: raw
        path: raw/dataset-tickets-multi-lang-4-20k.csv
        format: csv
        source_type: ticket
      - dataset_id: logs_raw
        label: HDFS log raw data
        scope: legacy_root
        stage: raw
        path: raw/HDFS_2k.log
        format: text
        source_type: log
      - dataset_id: documents_full
        label: Normalized ticket/log documents
        scope: legacy_root
        stage: normalized
        path: processed/documents_full.jsonl
        format: jsonl
      - dataset_id: field_chunks
        label: Field-aware ticket/log chunks
        scope: legacy_root
        stage: chunked
        path: processed/documents_field_chunks.jsonl
        format: jsonl
        case_id: field_chunks
        chunking_strategy: field
        qdrant_collection: koreanops_documents_field_chunks
        opensearch_index: koreanops_documents_field_chunks
      - dataset_id: contextual_chunks
        label: Contextual ticket/log chunks
        scope: legacy_root
        stage: chunked
        path: processed/documents_contextual_chunks.jsonl
        format: jsonl
        case_id: contextual_chunks
        chunking_strategy: contextual
        qdrant_collection: koreanops_documents_contextual_chunks
        opensearch_index: koreanops_documents_contextual_chunks
      - dataset_id: validation_questions
        label: Ticket/log validation QASET
        scope: legacy_root
        stage: qaset
        path: eval/validation_questions.jsonl
        format: jsonl
    reports:
      - report_id: experiment_report
        label: V1 experiment report
        scope: legacy_root
        role: experiment
        path: reports/experiment_report.md
      - report_id: failure_analysis
        label: V1 failure analysis
        scope: legacy_root
        role: failure_analysis
        path: reports/failure_analysis.md
      - report_id: validation_eval_report
        label: V1 validation eval report
        scope: legacy_root
        role: evaluation
        path: reports/validation_eval_report.md
      - report_id: vector_quality_diagnosis
        label: V1 vector quality diagnosis
        scope: legacy_root
        role: diagnosis
        path: reports/vector_quality_diagnosis.md
      - report_id: smoke_run
        label: V1 smoke run report
        scope: legacy_root
        role: smoke
        path: reports/smoke_run.md

  - project_id: ko_unstructured_v2
    version: v2
    label: Korean office PDF RAG
    data_root: C:\vectorsearch-data\ko-unstructured
    namespace_prefix: ko_unstructured_pdf_
    datasets:
      - dataset_id: raw_archives
        label: AI Hub raw PDF/label ZIP archives
        scope: full
        stage: raw
        path: raw
        format: directory
      - dataset_id: office_manifest
        label: Office PDF manifest
        scope: full
        stage: manifest
        path: processed/office_manifest.jsonl
        format: jsonl
      - dataset_id: normalized_documents
        label: Normalized office documents
        scope: full
        stage: normalized
        path: processed/full/office_documents_normalized.jsonl
        format: jsonl
      - dataset_id: pdf_pages_raw
        label: Parsed PDF pages
        scope: full
        stage: parsed
        path: processed/full/pdf_pages_raw.jsonl
        format: jsonl
      - dataset_id: pdf_blocks_cleaned
        label: Cleaned PDF text blocks
        scope: full
        stage: parsed
        path: processed/full/pdf_blocks_cleaned.jsonl
        format: jsonl
      - dataset_id: pdf_page_chunks
        label: Page chunks
        scope: full
        stage: chunked
        path: processed/full/chunks_page.jsonl
        format: jsonl
        case_id: pdf_page
        chunking_strategy: page
        qdrant_collection: ko_unstructured_pdf_page
        opensearch_index: ko_unstructured_pdf_page
      - dataset_id: pdf_structure_chunks
        label: Structure chunks
        scope: full
        stage: chunked
        path: processed/full/chunks_structure.jsonl
        format: jsonl
        case_id: pdf_structure
        chunking_strategy: structure
        qdrant_collection: ko_unstructured_pdf_structure
        opensearch_index: ko_unstructured_pdf_structure
      - dataset_id: oracle_documents
        label: Oracle documents
        scope: full
        stage: oracle
        path: eval/full/oracle_documents.jsonl
        format: jsonl
        case_id: pdf_oracle
        chunking_strategy: oracle
      - dataset_id: oracle_pages
        label: Oracle pages
        scope: full
        stage: oracle
        path: eval/full/oracle_pages.jsonl
        format: jsonl
        case_id: pdf_oracle
        chunking_strategy: oracle
      - dataset_id: golden_questions_reviewed
        label: Reviewed office QASET
        scope: full
        stage: qaset
        path: eval/full/golden_questions_reviewed.jsonl
        format: jsonl
      - dataset_id: retrieval_page_reviewed_details
        label: Page retrieval reviewed details
        scope: full
        stage: retrieval_result
        path: eval/full/retrieval_page_reviewed_details.csv
        format: csv
        case_id: pdf_page
      - dataset_id: retrieval_structure_reviewed_details
        label: Structure retrieval reviewed details
        scope: full
        stage: retrieval_result
        path: eval/full/retrieval_structure_reviewed_details.csv
        format: csv
        case_id: pdf_structure
    reports:
      - report_id: data_processing_spec_v2
        label: V2 full data processing spec
        scope: full
        role: data_spec
        path: reports/ko_unstructured_v2/data_processing_spec_v2.md
      - report_id: full_retrieval_experiment
        label: V2 full retrieval experiment
        scope: full
        role: experiment
        path: reports/ko_unstructured_v2/full_retrieval_experiment.md
      - report_id: full_golden_set_review
        label: V2 full golden set review
        scope: full
        role: qaset_review
        path: reports/ko_unstructured_v2/full_golden_set_review.md
      - report_id: rag_evaluation
        label: V2 RAG evaluation
        scope: full
        role: evaluation
        path: reports/ko_unstructured_v2/rag_evaluation.md
      - report_id: opensearch_qdrant_inventory
        label: V2 vector-store inventory and operations
        scope: full
        role: operations
        path: reports/ko_unstructured_v2/opensearch_qdrant_inventory_and_operations.md
      - report_id: data_quality_report
        label: V2 data quality report
        scope: full
        role: data_quality
        path: reports/ko_unstructured_v2/data_quality_report.md
      - report_id: retrieval_experiment
        label: V2 pilot retrieval experiment
        scope: pilot_100
        role: experiment
        path: reports/ko_unstructured_v2/retrieval_experiment.md
      - report_id: chunking_analysis
        label: V2 pilot chunking analysis
        scope: pilot_100
        role: chunking_analysis
        path: reports/ko_unstructured_v2/chunking_analysis.md
      - report_id: pdf_parsing_quality
        label: V2 PDF parsing quality
        scope: pilot_100
        role: parsing_quality
        path: reports/ko_unstructured_v2/pdf_parsing_quality.md
      - report_id: schema_v1
        label: V2 parsing/chunking/vector schema v1
        scope: historical
        role: schema
        path: reports/ko_unstructured_v2/data_parsing_chunking_vector_schema_v1.md

